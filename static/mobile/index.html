<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Supervillain</title>

    <!-- PWA meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Supervillain">
    <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f6f6f6" media="(prefers-color-scheme: light)">
    <link rel="manifest" href="/mobile/manifest.json">

    <!-- Apple touch icon -->
    <link rel="apple-touch-icon" href="/icon-180.png">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --surface-hover: #1a2744;
            --text: #e0e0e0;
            --text-muted: #888;
            --accent: #e94560;
            --accent-dim: #b8364d;
            --success: #2ecc71;
            --border: #2a2a4a;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f6f6f6;
                --surface: #ffffff;
                --surface-hover: #eeeeee;
                --text: #333333;
                --text-muted: #888;
                --accent: #e94560;
                --accent-dim: #b8364d;
                --border: #dddddd;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        /* App shell (hidden until accounts load) */
        #app-shell {
            display: none;
            flex-direction: column;
            height: 100dvh;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
            padding-left: var(--safe-left);
            padding-right: var(--safe-right);
        }

        #app-shell.active {
            display: flex;
        }

        #app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            min-height: 48px;
        }

        #app-header .title {
            font-size: 17px;
            font-weight: 600;
        }

        #app-header .account-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-muted);
            font-size: 13px;
            cursor: pointer;
            padding: 4px 12px;
            max-width: 55%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Account picker overlay */
        #account-picker {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            z-index: 30;
        }

        #account-picker.hidden { display: none; }

        #account-picker .picker-sheet {
            background: var(--bg);
            border-top: 1px solid var(--border);
            border-radius: 12px 12px 0 0;
            padding: 8px 0 calc(8px + var(--safe-bottom));
        }

        #account-picker .picker-title {
            font-size: 13px;
            color: var(--text-muted);
            padding: 8px 16px;
        }

        #account-picker .account-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            background: none;
            border: none;
            color: var(--text);
            font-size: 16px;
            padding: 14px 16px;
            text-align: left;
            cursor: pointer;
        }

        #account-picker .account-row.current {
            color: var(--accent);
        }

        #account-picker .account-row.pending {
            color: var(--text-muted);
        }

        #account-picker .account-provider {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Error toast */
        #error-toast {
            position: fixed;
            left: 16px;
            right: 16px;
            bottom: calc(16px + var(--safe-bottom));
            background: var(--surface);
            border: 1px solid var(--accent);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            line-height: 1.4;
            padding: 12px 14px;
            z-index: 40;
            word-break: break-word;
        }

        #error-toast.hidden { display: none; }

        /* Email list */
        #email-list-wrap {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        #pull-indicator {
            height: 0;
            overflow: hidden;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            line-height: 40px;
            transition: height 0.2s, opacity 0.2s;
        }

        .date-divider {
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .email-row {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            min-height: 72px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            position: relative;
            background: var(--bg);
            transition: transform 0.2s ease;
        }

        /* Dragging (rowSwipeRecognizer, app.js): no transition so the row
           tracks the finger 1:1; re-enabled on release for the spring-back. */
        .email-row.swiping {
            transition: none;
        }

        .email-row:active {
            background: var(--surface-hover);
        }

        .email-row.unread {
            background: var(--surface);
        }

        .email-row-main {
            flex: 1;
            min-width: 0;
        }

        .email-row-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 2px;
        }

        .email-from {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }

        .email-row.unread .email-from {
            color: var(--text);
            font-weight: 700;
        }

        .email-date {
            font-size: 13px;
            color: var(--text-muted);
            margin-left: 8px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .email-subject {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .email-row.unread .email-subject {
            color: var(--text);
            font-weight: 600;
        }

        .email-preview {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .email-row-indicators {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            margin-left: 8px;
            flex-shrink: 0;
        }

        .email-row-indicators .star {
            color: #f5a623;
            font-size: 14px;
        }

        .email-row-indicators .attach {
            font-size: 14px;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--text-muted);
            font-size: 15px;
        }

        /* Swipe actions (rowSwipeRecognizer, app.js) — .email-row-wrap holds
           the translated .email-row over a same-size .swipe-bg; dragging
           right reveals archive (left-aligned, green), left reveals trash
           (right-aligned, red). */
        .email-row-wrap {
            position: relative;
            overflow: hidden;
        }

        .swipe-bg {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            font-size: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s;
        }

        .swipe-bg .swipe-icon-archive,
        .swipe-bg .swipe-icon-trash {
            display: none;
        }

        .swipe-bg.swipe-reveal-archive {
            background: var(--success);
            justify-content: flex-start;
            padding-left: 24px;
            opacity: 1;
        }

        .swipe-bg.swipe-reveal-archive .swipe-icon-archive {
            display: block;
        }

        .swipe-bg.swipe-reveal-trash {
            background: var(--accent);
            justify-content: flex-end;
            padding-right: 24px;
            opacity: 1;
        }

        .swipe-bg.swipe-reveal-trash .swipe-icon-trash {
            display: block;
        }

        #status-bar {
            padding: 8px 16px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            min-height: 29px;
        }

        /* Email detail view */
        #email-detail {
            display: none;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        #detail-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            min-height: 48px;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
        }

        #back-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 16px;
            cursor: pointer;
            padding: 8px;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #detail-subject {
            font-size: 17px;
            font-weight: 600;
            flex: 1;
            min-width: 0;
            overflow-wrap: break-word;
        }

        #detail-meta {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            line-height: 1.5;
        }

        #detail-from {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 2px;
        }

        #detail-recipients {
            color: var(--text-muted);
            font-size: 12px;
        }

        #detail-date {
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 4px;
        }

        /* Attachments */
        #detail-attachments .att-header {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        .att-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            min-height: 44px;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: var(--text);
        }

        .att-item:active { background: var(--surface-hover); }
        .att-icon { font-size: 18px; flex-shrink: 0; }
        .att-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 14px; }
        .att-size { color: var(--text-muted); font-size: 12px; flex-shrink: 0; }

        /* Calendar indicator */
        .calendar-indicator {
            padding: 10px 16px;
            font-size: 13px;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
        }

        /* Email body */
        #email-body {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 12px 16px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        /* HTML emails render inside a sandboxed iframe (.email-iframe); the
           iframe owns its own scrolling and styling, so the parent suppresses
           padding/scroll for that case. */
        #email-body.html-content {
            padding: 0;
            overflow: hidden;
            display: flex;
        }

        .email-iframe {
            flex: 1;
            width: 100%;
            border: 0;
            display: block;
            background: #fff;
        }

        #email-body img { max-width: 100%; height: auto; }
        #email-body a { color: var(--accent); }

        .plain-text-body { white-space: pre-wrap; }

        /* Detail action bar — archive/trash/read/star (renderDetailActionBar,
           handleDetailAction in app.js). A flex-row footer sibling of
           #email-body, so it stays pinned below the scrolling body. */
        #detail-actions {
            display: flex;
            border-top: 1px solid var(--border);
            padding-bottom: var(--safe-bottom);
        }

        .detail-action-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
            padding: 10px 0;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .detail-action-btn:active {
            background: var(--surface-hover);
        }

        .detail-action-btn.active {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <!-- App shell (shown once accounts load) -->
    <div id="app-shell">
        <div id="app-header">
            <span class="title">Supervillain</span>
            <button class="account-btn" id="account-btn" aria-label="Switch account"></button>
        </div>
        <div id="email-list-wrap">
            <div id="pull-indicator">Pull to refresh</div>
            <div id="email-list"></div>
        </div>
        <div id="email-detail">
            <div id="detail-header">
                <button id="back-btn">&larr;</button>
                <div id="detail-subject"></div>
            </div>
            <div id="detail-meta">
                <div id="detail-from"></div>
                <div id="detail-recipients"></div>
                <div id="detail-date"></div>
            </div>
            <div id="detail-attachments"></div>
            <div id="detail-calendar"></div>
            <div id="email-body"></div>
            <div id="detail-actions">
                <button id="detail-archive-btn" class="detail-action-btn" aria-label="Archive">&#128452;</button>
                <button id="detail-trash-btn" class="detail-action-btn" aria-label="Trash">&#128465;</button>
                <button id="detail-read-btn" class="detail-action-btn" aria-label="Toggle read status">&#9679;</button>
                <button id="detail-star-btn" class="detail-action-btn" aria-label="Toggle star">&#9734;</button>
            </div>
        </div>
        <div id="status-bar"></div>
    </div>

    <!-- Account picker (bottom sheet) -->
    <div id="account-picker" class="hidden">
        <div class="picker-sheet">
            <div class="picker-title">Accounts</div>
            <div id="account-picker-list"></div>
        </div>
    </div>

    <!-- Error toast -->
    <div id="error-toast" class="hidden"></div>

    <script src="/api.js"></script>
    <script type="module" src="/mobile/app.js"></script>
</body>
</html>
