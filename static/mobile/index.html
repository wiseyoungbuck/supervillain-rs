<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Supervillain</title>

    <!-- PWA meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Supervillain">
    <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f6f6f6" media="(prefers-color-scheme: light)">
    <link rel="manifest" href="/mobile/manifest.json">

    <!-- Apple touch icon -->
    <link rel="apple-touch-icon" href="/icon-180.png">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --surface-hover: #1a2744;
            --text: #e0e0e0;
            --text-muted: #888;
            --accent: #e94560;
            --accent-dim: #b8364d;
            --success: #2ecc71;
            --warning: #f5a623;
            --border: #2a2a4a;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f6f6f6;
                --surface: #ffffff;
                --surface-hover: #eeeeee;
                --text: #333333;
                --text-muted: #888;
                --accent: #e94560;
                --accent-dim: #b8364d;
                --border: #dddddd;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        /* App shell (hidden until accounts load) */
        #app-shell {
            display: none;
            flex-direction: column;
            height: 100dvh;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
            padding-left: var(--safe-left);
            padding-right: var(--safe-right);
        }

        #app-shell.active {
            display: flex;
        }

        #app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            min-height: 48px;
        }

        #app-header .title {
            font-size: 17px;
            font-weight: 600;
        }

        #app-header .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        #app-header .icon-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 22px;
            line-height: 1;
            cursor: pointer;
            padding: 0;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #app-header .account-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-muted);
            font-size: 13px;
            cursor: pointer;
            padding: 4px 12px;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            /* Touch-target audit (kata 115b, task A12): the pill's own box was
               ~24px tall (padding + line height) — no shorter than icon-btn's
               44px next to it, since the header's height is already set by
               icon-btn regardless. */
            min-height: 44px;
            display: inline-flex;
            align-items: center;
        }

        /* Search bar (kata p80m, task A9): overlays/replaces the normal
           header row while active. Visibility is driven entirely by the
           #app-header.searching class (openSearch/closeSearchBar toggle it
           via classList, never .style.display) so this stays outside
           setScreen's display-ownership without tripping the invariant that
           every .style.display toggle lives inside setScreen. */
        #search-bar {
            display: none;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }

        #app-header.searching .title,
        #app-header.searching .header-right {
            display: none;
        }

        #app-header.searching #search-bar {
            display: flex;
        }

        #search-bar input[type="search"] {
            flex: 1;
            min-width: 0;
            font-size: 16px;
            padding: 8px 10px;
            /* Touch-target audit (kata 115b, task A12): padding alone put
               this under 44px tall. */
            min-height: 44px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text);
        }

        #search-clear-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            line-height: 1;
            cursor: pointer;
            padding: 0;
            /* Touch-target audit (kata 115b, task A12): bumped 32px -> 44px. */
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* Split tabs (kata 1wdy): horizontally scrollable, inbox-only. Hidden
           by default; .visible (renderSplitTabs) shows it, setScreen's own
           display toggle hides it entirely outside Screen.LIST. */
        #split-tabs {
            display: none;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        #split-tabs.visible {
            display: flex;
        }

        .split-tab {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-muted);
            font-size: 13px;
            padding: 10px 14px;
            min-height: 44px;
        }

        .split-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .split-count {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Offline banner (kata 115b, task A12): persistent chrome driven by
           connectivity events (online/offline + navigator.onLine at boot in
           app.js), not navigation — it must survive screen changes instead
           of being torn down like a toast, so it stays outside setScreen's
           switch and toggles via a class only, never .style.display (would
           trip the display-ownership invariant). As a normal-flow element
           ahead of the list/detail/compose sections it inherits the
           app-shell's own safe-top padding for free, the same trick
           bottom-nav uses for safe-bottom. */
        #offline-banner {
            display: none;
            padding: 6px 16px;
            background: var(--accent-dim);
            color: #fff;
            font-size: 12px;
            text-align: center;
        }

        #offline-banner.visible {
            display: block;
        }

        /* Bottom-sheet overlay pattern — originally the account picker, now
           shared: any full-screen backdrop sheet (e.g. #unsub-sheet, kata
           6chy task A11) adds class="sheet-overlay hidden" and toggles
           .hidden, rather than duplicating this CSS per sheet. */
        .sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            z-index: 30;
        }

        .sheet-overlay.hidden { display: none; }

        .picker-sheet {
            background: var(--bg);
            border-top: 1px solid var(--border);
            border-radius: 12px 12px 0 0;
            padding: 8px 0 calc(8px + var(--safe-bottom));
        }

        .picker-title {
            font-size: 13px;
            color: var(--text-muted);
            padding: 8px 16px;
        }

        .account-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            background: none;
            border: none;
            color: var(--text);
            font-size: 16px;
            padding: 14px 16px;
            text-align: left;
            cursor: pointer;
        }

        .account-row.current {
            color: var(--accent);
        }

        .account-row.pending {
            color: var(--text-muted);
        }

        .account-provider {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Toasts — one fixed flex stack holds both as normal flow children
           (undo above error) so a multi-line error toast can never overlap
           the undo toast. The stack itself ignores pointer events so it
           never blocks taps on content behind it; the toasts opt back in
           (the undo toast is tappable anywhere to undo). */
        #toast-stack {
            position: fixed;
            left: 16px;
            right: 16px;
            bottom: calc(16px + var(--safe-bottom));
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 40;
            pointer-events: none;
        }

        /* Lifted clear of the bottom nav while it shows (LIST; setScreen
           toggles the class) so toasts never render into the nav band. */
        #toast-stack.nav-visible {
            bottom: calc(16px + 48px + var(--safe-bottom));
        }

        #undo-toast,
        #error-toast {
            pointer-events: auto;
            background: var(--surface);
            border: 1px solid var(--accent);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            line-height: 1.4;
            padding: 12px 14px;
            word-break: break-word;
        }

        #undo-toast { cursor: pointer; }

        #undo-toast.hidden,
        #error-toast.hidden { display: none; }

        /* Email list */
        #email-list-wrap {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        #pull-indicator {
            height: 0;
            overflow: hidden;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            line-height: 40px;
            transition: height 0.2s, opacity 0.2s;
        }

        .date-divider {
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .email-row {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            min-height: 72px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            position: relative;
            background: var(--bg);
            transition: transform 0.2s ease;
        }

        /* Dragging (rowSwipeRecognizer, app.js): no transition so the row
           tracks the finger 1:1; re-enabled on release for the spring-back. */
        .email-row.swiping {
            transition: none;
        }

        .email-row:active {
            background: var(--surface-hover);
        }

        .email-row.unread {
            background: var(--surface);
        }

        .email-row-main {
            flex: 1;
            min-width: 0;
        }

        .email-row-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 2px;
        }

        .email-from {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }

        .email-row.unread .email-from {
            color: var(--text);
            font-weight: 700;
        }

        .email-date {
            font-size: 13px;
            color: var(--text-muted);
            margin-left: 8px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .email-subject {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .email-row.unread .email-subject {
            color: var(--text);
            font-weight: 600;
        }

        .email-preview {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .email-row-indicators {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            margin-left: 8px;
            flex-shrink: 0;
        }

        .email-row-indicators .star {
            color: var(--warning);
            font-size: 14px;
        }

        .email-row-indicators .attach {
            font-size: 14px;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--text-muted);
            font-size: 15px;
        }

        /* Swipe actions (rowSwipeRecognizer, app.js) — .email-row-wrap holds
           the translated .email-row over a same-size .swipe-bg; dragging
           right reveals archive (left-aligned, green), left reveals trash
           (right-aligned, red). */
        .email-row-wrap {
            position: relative;
            overflow: hidden;
        }

        .swipe-bg {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            font-size: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s;
        }

        .swipe-bg .swipe-icon-archive,
        .swipe-bg .swipe-icon-trash {
            display: none;
        }

        .swipe-bg.swipe-reveal-archive {
            background: var(--success);
            justify-content: flex-start;
            padding-left: 24px;
            opacity: 1;
        }

        .swipe-bg.swipe-reveal-archive .swipe-icon-archive {
            display: block;
        }

        .swipe-bg.swipe-reveal-trash {
            background: var(--accent);
            justify-content: flex-end;
            padding-right: 24px;
            opacity: 1;
        }

        .swipe-bg.swipe-reveal-trash .swipe-icon-trash {
            display: block;
        }

        #status-bar {
            padding: 8px 16px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            min-height: 29px;
        }

        /* Bottom nav (kata 1wdy): last flex child of #app-shell, so the
           shell's own safe-area padding-bottom already covers it — no
           position:fixed needed. setScreen shows/hides it per screen. */
        #bottom-nav {
            display: flex;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px 0;
            min-height: 48px;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-icon {
            font-size: 20px;
            line-height: 1;
        }

        .nav-label {
            font-size: 10px;
        }

        /* Email detail view */
        #email-detail {
            display: none;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        #detail-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            min-height: 48px;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
        }

        #back-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 16px;
            cursor: pointer;
            padding: 8px;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #detail-subject {
            font-size: 17px;
            font-weight: 600;
            flex: 1;
            min-width: 0;
            overflow-wrap: break-word;
        }

        #detail-meta {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            line-height: 1.5;
        }

        #detail-from {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 2px;
        }

        #detail-recipients {
            color: var(--text-muted);
            font-size: 12px;
        }

        #detail-date {
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 4px;
        }

        /* Attachments (kata 0g9v: inline image preview + Download All) */
        #detail-attachments .att-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        .att-download-all {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px;
            min-height: 44px;
            display: flex;
            align-items: center;
        }

        .att-item {
            display: flex;
            flex-direction: column;
            padding: 10px 16px;
            min-height: 44px;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: var(--text);
        }

        .att-item:active { background: var(--surface-hover); }

        /* Inline preview for image/* attachments only — tapping the row
           (image included) opens the full blob via the anchor, same as a
           non-image row. */
        .att-preview {
            display: block;
            max-width: 100%;
            max-height: 240px;
            border-radius: 8px;
            margin-bottom: 8px;
            object-fit: contain;
        }

        .att-row { display: flex; align-items: center; gap: 10px; }
        .att-icon { font-size: 18px; flex-shrink: 0; }
        .att-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 14px; }
        .att-size { color: var(--text-muted); font-size: 12px; flex-shrink: 0; }

        /* Calendar event card (kata nhxd, task A10): full-width, edge-to-edge
           like the attachments header/rows above it — no floating card
           chrome, just a left accent border like desktop's .calendar-card. */
        .calendar-card {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            border-left: 3px solid var(--accent);
        }

        .calendar-card.cancelled {
            opacity: 0.75;
        }

        .cal-cancelled {
            color: var(--accent);
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .cal-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .cal-icon { font-size: 16px; }

        .cal-title { font-weight: 600; font-size: 14px; }

        .cal-datetime {
            color: var(--accent);
            font-size: 13px;
            margin-bottom: 4px;
        }

        .cal-location, .cal-organizer, .cal-attendee-count {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 4px;
        }

        .calendar-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .rsvp-btn {
            flex: 1;
            min-height: 44px;
            border: 1px solid var(--border);
            background: var(--surface-hover);
            color: var(--text);
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }

        .rsvp-btn:active { opacity: 0.7; }

        .rsvp-btn.accept.active { background: var(--success); border-color: var(--success); color: #fff; }
        .rsvp-btn.maybe.active { background: var(--warning); border-color: var(--warning); color: #fff; }
        .rsvp-btn.decline.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        .rsvp-status-label {
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Email body */
        #email-body {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 12px 16px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        /* HTML emails render inside a sandboxed iframe (.email-iframe); the
           iframe owns its own scrolling and styling, so the parent suppresses
           padding/scroll for that case. */
        #email-body.html-content {
            padding: 0;
            overflow: hidden;
            display: flex;
        }

        .email-iframe {
            flex: 1;
            width: 100%;
            border: 0;
            display: block;
            background: #fff;
        }

        #email-body img { max-width: 100%; height: auto; }
        #email-body a { color: var(--accent); }

        .plain-text-body { white-space: pre-wrap; }

        /* Detail action bar — archive/trash/read/star (renderDetailActionBar,
           handleDetailAction in app.js). A flex-row footer sibling of
           #email-body, so it stays pinned below the scrolling body. */
        #detail-actions {
            display: flex;
            border-top: 1px solid var(--border);
            padding-bottom: var(--safe-bottom);
        }

        .detail-action-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
            padding: 10px 0;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .detail-action-btn:active {
            background: var(--surface-hover);
        }

        .detail-action-btn.active {
            color: var(--accent);
        }

        /* Reply/reply-all/forward row — text labels rather than glyphs, sitting
           above the stateful icon row. */
        #detail-compose-actions {
            display: flex;
            border-top: 1px solid var(--border);
        }

        .detail-action-btn.compose-action {
            font-size: 14px;
            font-weight: 500;
            color: var(--accent);
        }

        /* ================= Compose screen (kata ryzd, task A6) ================= */
        #compose-screen {
            display: none;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        #compose-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            min-height: 48px;
        }

        #compose-header button {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 16px;
            cursor: pointer;
            padding: 8px 4px;
            min-height: 44px;
            flex-shrink: 0;
        }

        #compose-header #compose-send-btn {
            font-weight: 600;
        }

        #compose-header button:disabled {
            color: var(--text-muted);
            cursor: default;
        }

        #compose-header .compose-title {
            font-size: 15px;
            font-weight: 600;
            flex: 1;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Inline discard confirmation — replaces a blocking confirm(). */
        #compose-discard-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        #compose-discard-bar.hidden { display: none; }

        #compose-discard-bar .discard-label {
            flex: 1;
            font-size: 13px;
            color: var(--text-muted);
        }

        #compose-discard-bar button {
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            padding: 8px 12px;
            /* Touch-target audit (kata 115b, task A12): bumped 40px -> 44px. */
            min-height: 44px;
        }

        #compose-discard-bar #compose-discard-confirm {
            color: var(--accent);
            border-color: var(--accent);
        }

        #compose-fields {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
        }

        .compose-field-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 16px;
            border-bottom: 1px solid var(--border);
            min-height: 48px;
        }

        .compose-field-row.hidden { display: none; }

        .compose-field-row label {
            color: var(--text-muted);
            font-size: 14px;
            width: 48px;
            flex-shrink: 0;
        }

        .compose-field-row input,
        .compose-field-row select {
            flex: 1;
            min-width: 0;
            background: none;
            border: none;
            color: var(--text);
            /* 16px prevents iOS Safari from zooming the viewport on focus. */
            font-size: 16px;
            padding: 12px 0;
        }

        .compose-field-row input:focus,
        .compose-field-row select:focus,
        #compose-body:focus {
            outline: none;
        }

        .compose-field-row select {
            appearance: none;
            -webkit-appearance: none;
        }

        #compose-body {
            width: 100%;
            min-height: 160px;
            background: none;
            border: none;
            color: var(--text);
            font-family: inherit;
            /* 16px prevents iOS zoom-on-focus. */
            font-size: 16px;
            line-height: 1.5;
            padding: 16px;
            resize: none;
            overflow: hidden;
        }

        /* Read-only quoted content (reply/forward), collapsed by default. */
        #compose-quote {
            border-top: 1px solid var(--border);
        }

        #compose-quote.hidden { display: none; }

        #compose-quote-toggle {
            width: 100%;
            background: none;
            border: none;
            color: var(--accent);
            font-size: 14px;
            text-align: left;
            cursor: pointer;
            padding: 12px 16px;
            min-height: 44px;
        }

        #compose-quote-body {
            padding: 0 16px 16px;
        }

        #compose-quote-body.hidden { display: none; }

        #compose-quote-body .quote-header {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        #compose-quote-body pre {
            white-space: pre-wrap;
            word-break: break-word;
            font-family: inherit;
            font-size: 14px;
            color: var(--text-muted);
        }

        #compose-quote-body iframe {
            width: 100%;
            height: 320px;
            border: 0;
            background: #fff;
        }

        /* Compose attachments (kata 0g9v) */
        #compose-attach-row {
            padding: 4px 16px;
            border-bottom: 1px solid var(--border);
        }

        #compose-attach-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 14px;
            cursor: pointer;
            padding: 10px 4px;
            min-height: 44px;
        }

        #compose-attachments.hidden { display: none; }

        #compose-attachments {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
        }

        .compose-attachment-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            max-width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 6px 6px 6px 10px;
            font-size: 13px;
            color: var(--text);
        }

        .compose-attachment-chip.uploading { opacity: 0.7; }

        .compose-attachment-chip.error {
            border-color: var(--accent);
            color: var(--accent);
        }

        .att-chip-name {
            max-width: 140px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .att-chip-status {
            color: var(--text-muted);
            font-size: 12px;
            flex-shrink: 0;
        }

        .compose-attachment-chip.error .att-chip-status { color: var(--accent); }

        /* Touch-target audit (kata 115b, task A12): deliberately left at
           32px, not bumped to 44px — it sits inside a compact inline chip
           (.compose-attachment-chip) among several chips per row; a 44px
           target here would force one chip per row and wreck density for a
           low-frequency, low-consequence action (remove one attachment
           before send, easily re-added). */
        .att-chip-remove {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1;
            cursor: pointer;
            padding: 4px;
            min-width: 32px;
            min-height: 32px;
        }
    </style>
</head>
<body>
    <!-- App shell (shown once accounts load) -->
    <div id="app-shell">
        <div id="app-header">
            <span class="title">Supervillain</span>
            <div class="header-right">
                <button class="icon-btn" id="search-btn" aria-label="Search">&#128269;</button>
                <button class="icon-btn" id="compose-btn" aria-label="New message">&#9998;</button>
                <button class="account-btn" id="account-btn" aria-label="Switch account"></button>
            </div>
            <!-- Search bar (kata p80m, task A9): plain query box, no token
                 chips — operators (from:/is:/has:/before:/after:) are parsed
                 fully server-side (src/search.rs). -->
            <div id="search-bar">
                <input type="search" id="search-input" placeholder="Search (from: is: has: before: after:)" enterkeyhint="search" aria-label="Search mail">
                <button id="search-clear-btn" aria-label="Clear search">&#10005;</button>
            </div>
        </div>
        <!-- Split tabs (kata 1wdy, task A8): inbox-only, hidden via the
             .visible class in renderSplitTabs (screen-level show/hide is
             setScreen's job, same as app-header). -->
        <div id="split-tabs"></div>
        <!-- Offline banner (kata 115b, task A12): shown/hidden purely by
             connectivity (see the CSS comment above and setOfflineBanner in
             app.js) — not a screen, so it isn't in setScreen's switch and
             stays visible across screen changes rather than being scoped to
             LIST. -->
        <div id="offline-banner">Offline — data may be stale</div>
        <div id="email-list-wrap">
            <div id="pull-indicator">Pull to refresh</div>
            <div id="email-list"></div>
        </div>
        <div id="email-detail">
            <div id="detail-header">
                <button id="back-btn">&larr;</button>
                <div id="detail-subject"></div>
            </div>
            <div id="detail-meta">
                <div id="detail-from"></div>
                <div id="detail-recipients"></div>
                <div id="detail-date"></div>
            </div>
            <div id="detail-attachments"></div>
            <div id="detail-calendar"></div>
            <div id="email-body"></div>
            <!-- Reply / reply-all / forward (kata ryzd, task A6): a second
                 action row above the stateful archive/trash/read/star row so
                 all six targets stay 44px+ without crowding one strip. -->
            <div id="detail-compose-actions">
                <button id="detail-reply-btn" class="detail-action-btn compose-action" aria-label="Reply">Reply</button>
                <button id="detail-reply-all-btn" class="detail-action-btn compose-action" aria-label="Reply all">Reply all</button>
                <button id="detail-forward-btn" class="detail-action-btn compose-action" aria-label="Forward">Forward</button>
            </div>
            <div id="detail-actions">
                <button id="detail-archive-btn" class="detail-action-btn" aria-label="Archive">&#128452;</button>
                <button id="detail-trash-btn" class="detail-action-btn" aria-label="Trash">&#128465;</button>
                <button id="detail-read-btn" class="detail-action-btn" aria-label="Toggle read status">&#9679;</button>
                <button id="detail-star-btn" class="detail-action-btn" aria-label="Toggle star">&#9734;</button>
                <!-- Overflow menu (kata 6chy, task A11): opens #unsub-sheet.
                     Long-press on list rows was ruled out (conflicts with the
                     swipe recognizers), so this detail-view button is the
                     sole entry point. -->
                <button id="detail-more-btn" class="detail-action-btn" aria-label="More actions">&#8943;</button>
            </div>
        </div>
        <!-- Compose (kata ryzd, task A6): new / reply / reply-all / forward.
             A full-screen sibling of the list and detail views; setScreen()
             owns its show/hide. The quote block below the body is read-only —
             it is appended at send time, mirroring desktop. -->
        <div id="compose-screen">
            <div id="compose-header">
                <button id="compose-cancel-btn" aria-label="Cancel">Cancel</button>
                <span id="compose-title" class="compose-title">New message</span>
                <button id="compose-send-btn" aria-label="Send">Send</button>
            </div>
            <!-- Inline discard confirmation (no blocking confirm()): shown only
                 when Cancel is pressed on a dirty draft. -->
            <div id="compose-discard-bar" class="hidden">
                <span class="discard-label">Discard draft?</span>
                <button id="compose-discard-keep">Keep editing</button>
                <button id="compose-discard-confirm">Discard</button>
            </div>
            <div id="compose-fields">
                <div id="compose-from-row" class="compose-field-row hidden">
                    <label for="compose-from">From</label>
                    <select id="compose-from"></select>
                </div>
                <div class="compose-field-row">
                    <label for="compose-to">To</label>
                    <input id="compose-to" type="email" inputmode="email" autocapitalize="off" autocorrect="off" placeholder="Recipients (comma-separated)">
                </div>
                <div class="compose-field-row">
                    <label for="compose-cc">Cc</label>
                    <input id="compose-cc" type="email" inputmode="email" autocapitalize="off" autocorrect="off" placeholder="Cc (comma-separated)">
                </div>
                <div class="compose-field-row">
                    <label for="compose-subject">Subject</label>
                    <input id="compose-subject" type="text" placeholder="Subject">
                </div>
                <textarea id="compose-body" placeholder="Write your message"></textarea>
                <!-- Attachment sending (kata 0g9v): the file input is hidden and
                     opened via the visible 📎 button — file inputs render
                     inconsistently across mobile browsers when shown directly. -->
                <div id="compose-attach-row">
                    <button id="compose-attach-btn" type="button">&#128206; Attach</button>
                    <input id="compose-file-input" type="file" multiple style="display:none">
                </div>
                <div id="compose-attachments" class="hidden">
                    <div id="compose-attachments-list"></div>
                </div>
                <div id="compose-quote" class="hidden">
                    <button id="compose-quote-toggle" type="button">Show quoted text</button>
                    <div id="compose-quote-body" class="hidden"></div>
                </div>
            </div>
        </div>
        <div id="status-bar"></div>
        <!-- Bottom nav (kata 1wdy, task A8): the five role mailboxes only —
             custom/role-less folders and Spam are out of scope for v1.
             setScreen() owns show/hide (LIST only); renderBottomNav() owns
             which item is active. -->
        <nav id="bottom-nav">
            <button class="nav-item" data-role="inbox" aria-label="Inbox">
                <span class="nav-icon">&#128229;</span>
                <span class="nav-label">Inbox</span>
            </button>
            <button class="nav-item" data-role="archive" aria-label="Archive">
                <span class="nav-icon">&#128452;</span>
                <span class="nav-label">Archive</span>
            </button>
            <button class="nav-item" data-role="sent" aria-label="Sent">
                <span class="nav-icon">&#128228;</span>
                <span class="nav-label">Sent</span>
            </button>
            <button class="nav-item" data-role="drafts" aria-label="Drafts">
                <span class="nav-icon">&#128221;</span>
                <span class="nav-label">Drafts</span>
            </button>
            <button class="nav-item" data-role="trash" aria-label="Trash">
                <span class="nav-icon">&#128465;</span>
                <span class="nav-label">Trash</span>
            </button>
        </nav>
    </div>

    <!-- Account picker (bottom sheet) -->
    <div id="account-picker" class="sheet-overlay hidden">
        <div class="picker-sheet">
            <div class="picker-title">Accounts</div>
            <div id="account-picker-list"></div>
        </div>
    </div>

    <!-- Unsubscribe & archive all (kata 6chy, task A11): reuses the account
         picker's bottom-sheet pattern above. Tapping the confirm row IS the
         confirmation — no separate confirm() dialog, mirroring desktop's
         unsubscribeAndArchiveAll (static/app.js), which fires straight off
         the 'U' keyboard shortcut with no confirm step of its own. -->
    <div id="unsub-sheet" class="sheet-overlay hidden">
        <div class="picker-sheet">
            <button id="unsub-sheet-confirm" class="account-row"></button>
            <button id="unsub-sheet-cancel" class="account-row">Cancel</button>
        </div>
    </div>

    <!-- Toast stack: undo (archive/trash) above error. Boots with
         .nav-visible: the initial screen is LIST (nav showing) and
         setScreen — which owns the toggle — only runs on navigation. -->
    <div id="toast-stack" class="nav-visible">
        <div id="undo-toast" class="hidden"></div>
        <div id="error-toast" class="hidden"></div>
    </div>

    <script src="/api.js"></script>
    <script type="module" src="/mobile/app.js"></script>
</body>
</html>
